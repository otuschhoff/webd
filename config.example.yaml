# Route evaluation is prefix-based and the longest matching prefix wins.
# Keep more specific routes (like /api/) alongside a final catch-all / route.
routes:
  # Requests beginning with /api/ are proxied to backend API v1 paths.
  - path_prefix: /api/
    upstream: http://127.0.0.1:8080/api/v1/
    # Optional IPv4 client allow-list for this route. Supports:
    # - single IPv4: 192.0.2.10
    # - range: 192.0.2.10-192.0.2.50
    # - subnet (CIDR): 192.0.2.0/24
    allowed_ipv4:
      - 127.0.0.1
      - 10.0.0.0/8

  # Example HTTPS upstream with a custom trusted CA bundle.
  # - path_prefix: /internal/
  #   upstream: https://api.internal.example.com/v1/
  #   trusted_ca:
  #     name: internal-api
  #     cert_path: /etc/pki/ca-trust/source/anchors/internal-api.crt

  # Example WebSocket upstream over TLS.
  # - path_prefix: /websocket/
  #   upstream: wss://server.eu.example.com:9000/websocket/
  #   trusted_ca:
  #     name: server-ws
  #     cert_path: /etc/pki/ca-trust/source/anchors/server-ws.crt

  # Example permanent redirect route.
  # Exactly one of upstream or redirect must be set per route.
  # - path_prefix: /legacy/
  #   redirect: https://www.example.com/new-home/

  # Fallback for everything else.
  - path_prefix: /
    upstream: http://127.0.0.1:3000
